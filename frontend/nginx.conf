# Frontend nginx — serves the SPA and proxies API calls to the backend.
# ${BACKEND_URL} is substituted from the env var at container start (envsubst).
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback — client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend API + health + SSE stream.
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Server-Sent Events: disable buffering so trace events stream live.
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass ${BACKEND_URL};
    }
}
